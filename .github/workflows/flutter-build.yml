name: Flutter Build Platform Shared

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: 'Upload artifact'
        required: false
        default: false
        type: boolean

env:
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_VERSION: "3.22.3"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-unknown-linux-gnu    , os: ubuntu-20.04, use-cross: true }
          - { target: arm-unknown-linux-gnueabihf  , os: ubuntu-20.04, use-cross: true }
          - { target: arm-unknown-linux-musleabihf , os: ubuntu-20.04, use-cross: true }
          - { target: i686-pc-windows-msvc         , os: windows-2022                  }
          - { target: i686-unknown-linux-gnu       , os: ubuntu-20.04, use-cross: true }
          - { target: i686-unknown-linux-musl      , os: ubuntu-20.04, use-cross: true }
          - { target: x86_64-apple-darwin          , os: macos-13                      }
          - { target: x86_64-pc-windows-gnu        , os: windows-2022                  }
          - { target: x86_64-pc-windows-msvc       , os: windows-2022                  }
          - { target: x86_64-unknown-linux-gnu     , os: ubuntu-20.04                  }
          - { target: x86_64-unknown-linux-musl    , os: ubuntu-20.04, use-cross: true }
    steps:
      - name: Free Disk Space (Ubuntu)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        shell: bash
        run: |
          case ${{ matrix.job.target }} in
            x86_64-unknown-linux-gnu)
              sudo apt-get -y update
              sudo apt-get install -y \
                  clang \
                  cmake \
                  curl \
                  gcc \
                  git \
                  g++ \
                  libpam0g-dev \
                  libasound2-dev \
                  libunwind-dev \
                  libgstreamer1.0-dev \
                  libgstreamer-plugins-base1.0-dev \
                  libgtk-3-dev \
                  libpulse-dev \
                  libva-dev \
                  libvdpau-dev \
                  libxcb-randr0-dev \
                  libxcb-shape0-dev \
                  libxcb-xfixes0-dev \
                  libxdo-dev \
                  libxfixes-dev \
                  nasm \
                  wget
              ;;
            arm-unknown-linux-*) sudo apt-get -y update ; sudo apt-get -y install gcc-arm-linux-gnueabihf ;;
            aarch64-unknown-linux-gnu) sudo apt-get -y update ; sudo apt-get -y install gcc-aarch64-linux-gnu ;;
          esac

      - name: Restore bridge files (Universal via GitHub Artifacts)
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-flutter-rust-bridge.yml
          name: bridge-artifact
          path: flutter/src/generated
          repo: rustdesk/rustdesk
          branch: master
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Install LLVM and Clang
        if: matrix.job.os == 'windows-2022'
        run: |
          choco install llvm -y
        shell: pwsh

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Replace engine with rustdesk custom flutter engine
        shell: bash
        run: |
          case ${{ matrix.job.target }} in
            x86_64-apple-darwin)
              ;;
            x86_64-pc-windows-msvc)
              cd flutter
              sed -i 's|#https://github.com|https://github.com|g' windows/flutter/generated_plugins.cmake || true
              curl -L -o windows-flutter-engine-3.22.3.zip https://github.com/rustdesk/rustdesk-ext/releases/download/engine/windows-flutter-engine-3.22.3.zip
              unzip -o windows-flutter-engine-3.22.3.zip -d bin
              rm windows-flutter-engine-3.22.3.zip
              ;;
            i686-pc-windows-msvc)
              cd flutter
              sed -i 's|#https://github.com|https://github.com|g' windows/flutter/generated_plugins.cmake || true
              curl -L -o windows-flutter-engine-3.22.3-x86.zip https://github.com/rustdesk/rustdesk-ext/releases/download/engine/windows-flutter-engine-3.22.3-x86.zip
              unzip -o windows-flutter-engine-3.22.3-x86.zip -d bin
              rm windows-flutter-engine-3.22.3-x86.zip
              ;;
            x86_64-unknown-linux-gnu)
              cd flutter
              wget -q https://github.com/rustdesk/rustdesk-ext/releases/download/engine/linux-flutter-engine-3.22.3.zip
              unzip -o linux-flutter-engine-3.22.3.zip -d bin
              rm linux-flutter-engine-3.22.3.zip
              ;;
          esac

      - name: Patch flutter
        shell: bash
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enable_feedback.patch || true
          [[ "3.22.3" == "${{ env.FLUTTER_VERSION }}" ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.22.2_dropdown_menu_enable_feedback.patch || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flutter-build-${{ matrix.job.os }}

      - name: Setup vcpkg with Github Actions binary cache
        if: matrix.job.os != 'macos-13'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        if: matrix.job.os != 'macos-13'
        run: |
          if [ "${{ matrix.job.os }}" = "windows-2022" ]; then
            $env:VCPKG_ROOT/vcpkg install --x-install-root="$env:VCPKG_ROOT/installed" --triplet x64-windows
          else
            $VVCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
          fi
        shell: pwsh

      - name: Build rustdesk
        run: |
          if [ "${{ matrix.job.os }}" = "windows-2022" ]; then
            python3 ./build.py --portable --hwcodec --flutter --vram --skip-portable-pack
            mv ./flutter/build/windows/x64/runner/Release ./rustdesk
          else
            python3 ./build.py --flutter
          fi
        shell: bash

      - name: Vynucene ulozeni Windows exe souboru
        if: matrix.job.os == 'windows-2022' && matrix.job.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: Moje-Vlastni-Podpora-Windows
          path: rustdesk/

      - name: Download usbmmidd_v2.zip and extract it to ./rustdesk
        if: matrix.job.os == 'windows-2022'
        run: |
          Invoke-WebRequest -Uri https://github.com/rustdesk/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 .\rustdesk
        shell: pwsh

      - name: Download printer driver files and extract them to ./rustdesk
        if: matrix.job.os == 'windows-2022'
        run: |
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums

            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4.zip$').Matches.Groups[1].Value
            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter.zip$').Matches.Groups[1].Value
            $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
                Write-Output "rustdesk_printer_driver_v4-1.4, checksums match, extract the file."
                Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
                mkdir ./rustdesk/drivers
                mv -Force .\rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
                Expand-Archive printer_driver_adapter.zip -DestinationPath .
                mv -Force .\printer_driver_adapter.dll ./rustdesk
            }
          } catch {
              Write-Host "Ignore the printer driver error."
          }
        shell: pwsh

      - name: find Runner.res
        if: matrix.job.os == 'windows-2022'
        run: |
          $RunnerResPath = Get-ChildItem -Path C:\ -Filter "Runner.res" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          echo "RUNNER_RES_PATH=$RunnerResPath" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Download RustDeskTempTopMostWindow artifacts
        if: matrix.job.os == 'windows-2022'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-RustDeskTempTopMostWindow.yml
          name: RustDeskTempTopMostWindow-${{ matrix.job.target }}
          path: rustdesk
          repo: rustdesk/rustdesk
          branch: master
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Upload unsigned
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ matrix.job.target }}-unsigned
          path: rustdesk

      - name: Sign rustdesk files
        if: inputs.upload-artifact == true && matrix.job.os == 'windows-2022' && env.HAS_SIGN_SECRET == 'true'
        run: |
          echo "Signing files"
        shell: pwsh

      - name: Build self-extracted executable
        if: inputs.upload-artifact == true && matrix.job.os == 'windows-2022' && matrix.job.target == 'x86_64-pc-windows-msvc'
        run: |
          cd rustdesk
          curl -L -o 7z.exe https://github.com/rustdesk/rustdesk-org/rdev/releases/download/tools/7z.exe
          curl -L -o 7zSD.sfx https://github.com/rustdesk/rustdesk-org/rdev/releases/download/tools/7zSD.sfx
          curl -L -o app.config https://github.com/rustdesk/rustdesk-org/rdev/releases/download/tools/app.config
          (Get-Content app_config) | Foreach-Object {$_ -replace "rustdesk.exe", "rustdesk.exe"} | Set-Content app.config
          .\7z.exe a -mx9 rustdesk.7z rustdesk.exe
          Copy-Item -Path "7zSD.sfx" -Destination "rustdesk-portable.exe"
          Get-Content -Path "rustdesk.7z" -Encoding Byte -Raw | Add-Content -Path "rustdesk-portable.exe" -Encoding Byte
          cd ..
        shell: pwsh

      - name: Add MSBuild to PATH
        if: inputs.upload-artifact == true && matrix.job.os == 'windows-2022'
        uses: microsoft/setup-msbuild@v2

      - name: Build msi
        if: inputs.upload-artifact == true && matrix.job.os == 'windows-2022'
        run: |
          echo "Building MSI Package"
        shell: pwsh

      - name: Sign rustdesk self-extracted file
        if: inputs.upload-artifact == true && matrix.job.os == 'windows-2022' && env.HAS_SIGN_SECRET == 'true'
        run: |
          echo "Signing files"
        shell: pwsh

      - name: Publish Release
        if: inputs.upload-artifact == true
        shell: bash
        run: |
          echo "Publishing Release Assets"

      - name: Build web
        if: matrix.job.target == 'x86_64-unknown-linux-gnu' && inputs.upload-artifact == true
        shell: bash
        run: |
          echo "Building Web Version"

      - name: Publish web
        if: matrix.job.target == 'x86_64-unknown-linux-gnu' && inputs.upload-artifact == true
        shell: bash
        run: |
          echo "Publishing Web Version Assets"
