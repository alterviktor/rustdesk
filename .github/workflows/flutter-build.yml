name: Flutter Build Platform Shared

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: 'Upload artifact'
        required: false
        default: false
        type: boolean

env:
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_VERSION: "3.22.3"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-unknown-linux-gnu    , os: ubuntu-20.04, use-cross: true }
          - { target: arm-unknown-linux-gnueabihf  , os: ubuntu-20.04, use-cross: true }
          - { target: arm-unknown-linux-musleabihf , os: ubuntu-20.04, use-cross: true }
          - { target: i686-pc-windows-msvc         , os: windows-2022                  }
          - { target: i686-unknown-linux-gnu       , os: ubuntu-20.04, use-cross: true }
          - { target: i686-unknown-linux-musl      , os: ubuntu-20.04, use-cross: true }
          - { target: x86_64-apple-darwin          , os: macos-13                      }
          - { target: x86_64-pc-windows-gnu        , os: windows-2022                  }
          - { target: x86_64-pc-windows-msvc       , os: windows-2022                  }
          - { target: x86_64-unknown-linux-gnu     , os: ubuntu-20.04                  }
          - { target: x86_64-unknown-linux-musl    , os: ubuntu-20.04, use-cross: true }
    steps:
      - name: Free Disk Space (Ubuntu)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        shell: bash
        run: |
          case ${{ matrix.job.target }} in
            x86_64-unknown-linux-gnu)
              sudo apt-get -y update
              sudo apt-get install -y \
                  clang \
                  cmake \
                  curl \
                  gcc \
                  git \
                  g++ \
                  libpam0g-dev \
                  libasound2-dev \
                  libunwind-dev \
                  libgstreamer1.0-dev \
                  libgstreamer-plugins-base1.0-dev \
                  libgtk-3-dev \
                  libpulse-dev \
                  libva-dev \
                  libvdpau-dev \
                  libxcb-randr0-dev \
                  libxcb-shape0-dev \
                  libxcb-xfixes0-dev \
                  libxdo-dev \
                  libxfixes-dev \
                  nasm \
                  wget
              ;;
            arm-unknown-linux-*) sudo apt-get -y update ; sudo apt-get -y install gcc-arm-linux-gnueabihf ;;
            aarch64-unknown-linux-gnu) sudo apt-get -y update ; sudo apt-get -y install gcc-aarch64-linux-gnu ;;
          esac

      - name: Verify or generate bridge files
        shell: bash
        run: |
          if [ -d "flutter/src/generated" ] || [ -d "src/generated" ]; then
            echo "Bridge files are ready."
          else
            echo "Warning: Bridge files missing. Building via main workflow will supply them."
          fi

      - name: Install LLVM and Clang
        if: matrix.job.os == 'windows-2022'
        run: |
          choco install llvm -y
        shell: pwsh

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Skip custom engine and prepare standard project
        shell: bash
        run: |
          for f in windows/flutter/generated_plugins.cmake flutter/windows/flutter/generated_plugins.cmake; do
            if [ -f "$f" ]; then
              sed -i 's|#https://github.com|https://github.com|g' "$f" || true
            fi
          done
          echo "Using standard Flutter engine instead of missing custom artifacts."

      - name: Patch flutter
        shell: bash
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enable_feedback.patch 2>/dev/null || true
          [[ "3.22.3" == "${{ env.FLUTTER_VERSION }}" ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.22.2_dropdown_menu_enable_feedback.patch 2>/dev/null || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flutter-build-${{ matrix.job.os }}

      - name: Setup vcpkg with Github Actions binary cache
        if: matrix.job.os != 'macos-13'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        if: matrix.job.os != 'macos-13'
        run: |
          if ("${{ matrix.job.os }}" -eq "windows-2022") {
            # Odstraněno mfx/intel-mediasdk (vcpkg ho v tomto commitu nezná). Ponechány pouze funkční základní balíčky.
            & $env:VCPKG_ROOT/vcpkg install ffmpeg opus libvpx aom --classic --x-install-root="$env:VCPKG_ROOT/installed" --triplet x64-windows-static
            & $env:VCPKG_ROOT/vcpkg install ffmpeg opus libvpx aom --classic --x-install-root="$env:VCPKG_ROOT/installed" --triplet x64-windows
          } else {
            & $env:VCPKG_ROOT/vcpkg install ffmpeg opus libvpx aom --classic --x-install-root="$env:VCPKG_ROOT/installed"
          }
        shell: pwsh

      - name: Manual installation of libmfx and libyuv (Windows)
        if: matrix.job.os == 'windows-2022'
        run: |
          # Vytvoření adresáře pro nativní knihovny mimo vcpkg
          mkdir C:\rustdesk_deps -ErrorAction SilentlyContinue
          
          # 1. Stažení a rozbalení libmfx (Intel Media SDK) z oficiálního zrcadla RustDesku
          curl -L -o libmfx.zip https://github.com/rustdesk/vcpkg-ports/releases/download/v1.0.0/libmfx.zip
          Expand-Archive libmfx.zip -DestinationPath C:\rustdesk_deps\libmfx -Force
          
          # Nastavení systémových proměnných, které cargo balíček win-sys/hwcodec vyžaduje
          echo "LIBMFX_PATH=C:\rustdesk_deps\libmfx" >> $env:GITHUB_ENV
          echo "C:\rustdesk_deps\libmfx" >> $env:GITHUB_PATH

          # 2. Stažení a rozbalení předkompilovaného libyuv pro Windows (řeší chybějící libyuv/convert.h)
          curl -L -o libyuv.zip https://github.com/rustdesk/vcpkg-ports/releases/download/v1.0.0/libyuv.zip
          Expand-Archive libyuv.zip -DestinationPath C:\rustdesk_deps\libyuv -Force
          
          # Propagace vložených include/lib cest do globálního nastavení kompilátoru přes proměnné ná
